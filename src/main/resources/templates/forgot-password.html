<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg,#0f172a,#1e293b); height:100vh; display:flex; align-items:center; justify-content:center;">

<div class="card shadow-lg p-4" style="width:400px; border-radius:15px;">

    <h3 class="text-center mb-3">Forgot Password</h3>
    <p class="text-center text-muted">Enter your email to receive reset link</p>

    <form action="/forgot-password" method="post">

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Send Reset Link
        </button>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/login}">Back to Login</a>
    </div>

</div>

</body>
</html>
